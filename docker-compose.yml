version: "3.9"

services:
  zupu:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zupu-app
    restart: unless-stopped
    ports:
      - "3000:3000"          # 宿主机端口:容器端口，可按需修改
    env_file:
      - .env.production
    volumes:
      - /www/zp/zupu-app/data:/data                 # SQLite 数据库文件持久化（宿主机目录）
      - zupu_uploads:/app/public/uploads # 用户上传图片持久化
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  zupu_uploads:
